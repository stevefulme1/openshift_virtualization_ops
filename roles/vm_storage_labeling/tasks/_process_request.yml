---

- name: _process_request | Query PVCs by Name
  when: vm_storage_labeling_current_request.names | default([], true) | length > 0
  kubernetes.core.k8s_info:
    api_key: "{{ vm_storage_labeling_api_key }}"
    host: "{{ vm_storage_labeling_openshift_host }}"
    api_version: v1
    kind: PersistentVolumeClaim
    namespace: "{{ vm_storage_labeling_current_request.namespace }}"
    name: "{{ vm_storage_labeling_pvc_name }}"
    validate_certs: "{{ vm_storage_labeling_openshift_verify_ssl }}"
  register: vm_storage_labeling_pvc_by_name
  loop: "{{ vm_storage_labeling_current_request.names }}"
  loop_control:
    loop_var: vm_storage_labeling_pvc_name
    label: "{{ vm_storage_labeling_pvc_name }}"

- name: _process_request | Query PVCs by Label Selector
  when: vm_storage_labeling_current_request.label_selectors | default([], true) | length > 0
  kubernetes.core.k8s_info:
    api_key: "{{ vm_storage_labeling_api_key }}"
    host: "{{ vm_storage_labeling_openshift_host }}"
    api_version: v1
    kind: PersistentVolumeClaim
    namespace: "{{ vm_storage_labeling_current_request.namespace }}"
    label_selectors: "{{ vm_storage_labeling_current_request.label_selectors }}"
    validate_certs: "{{ vm_storage_labeling_openshift_verify_ssl }}"
  register: vm_storage_labeling_pvc_by_selector

- name: _process_request | Query All PVCs in Namespace
  when:
    - vm_storage_labeling_current_request.names | default([], true) | length == 0
    - vm_storage_labeling_current_request.label_selectors | default([], true) | length == 0
  kubernetes.core.k8s_info:
    api_key: "{{ vm_storage_labeling_api_key }}"
    host: "{{ vm_storage_labeling_openshift_host }}"
    api_version: v1
    kind: PersistentVolumeClaim
    namespace: "{{ vm_storage_labeling_current_request.namespace }}"
    validate_certs: "{{ vm_storage_labeling_openshift_verify_ssl }}"
  register: vm_storage_labeling_pvc_all

- name: _process_request | Build Volume List from Named PVCs
  when: vm_storage_labeling_pvc_by_name is not skipped
  ansible.builtin.set_fact:
    vm_storage_labeling_volumes: >-
      {{ vm_storage_labeling_pvc_by_name.results
         | selectattr('resources', 'defined')
         | map(attribute='resources')
         | flatten }}

- name: _process_request | Build Volume List from Selector PVCs
  when: vm_storage_labeling_pvc_by_selector is not skipped
  ansible.builtin.set_fact:
    vm_storage_labeling_volumes: "{{ vm_storage_labeling_pvc_by_selector.resources | default([]) }}"

- name: _process_request | Build Volume List from All PVCs
  when: vm_storage_labeling_pvc_all is not skipped
  ansible.builtin.set_fact:
    vm_storage_labeling_volumes: "{{ vm_storage_labeling_pvc_all.resources | default([]) }}"

- name: _process_request | Verify Volumes Found
  ansible.builtin.assert:
    that:
      - vm_storage_labeling_volumes | default([], true) | length > 0
    fail_msg: >-
      No PersistentVolumeClaims found in namespace '{{ vm_storage_labeling_current_request.namespace }}'
      matching the provided criteria
    quiet: true

- name: _process_request | Apply Labels and Annotations to Volumes
  ansible.builtin.include_tasks:
    file: _apply_metadata.yml
  loop: "{{ vm_storage_labeling_volumes }}"
  loop_control:
    loop_var: vm_storage_labeling_volume
    label: >-
      Namespace: {{ vm_storage_labeling_volume.metadata.namespace }}
      - Name: {{ vm_storage_labeling_volume.metadata.name }}

...
